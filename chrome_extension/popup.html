<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      color: #1e293b;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: #0284c7;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .btn:hover { background: #0369a1; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #result {
      min-height: 48px;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    #result.visible { display: block; }
    #result.safe { background: #dcfce7; color: #166534; }
    #result.threat { background: #fef2f2; color: #b91c1c; }
    #result.allowed { background: #e0f2fe; color: #0369a1; }
    #result.error { background: #fef3c7; color: #92400e; }
    #result .status { font-weight: 700; }
    #result .url { font-size: 11px; color: #64748b; margin-top: 4px; word-break: break-all; }
  </style>
</head>
<body>
  <h1>🛡️ Shield360</h1>
  <button id="scanBtn" class="btn">Scan this page</button>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
